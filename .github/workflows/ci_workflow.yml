name: CI

on:
  pull_request:
    branches: [ master ]

jobs:
  lint:
    uses: basel5001/githubinfra/.github/workflows/linting.yml@main
    with:
      linter: ruff
      extra-args: "check --line-length=100"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install flake8
        run: pip install flake8
      - name: Run CI script
        run: bash scripts/run_ci.sh